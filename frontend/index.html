<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suri Trad - Stock Screener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-graph-up"></i>
                Suri Trad - Stock Screener
            </span>
            <div class="d-flex gap-2">
                <span class="navbar-text text-light" id="lastUpdate">Last Update: --:--</span>
                <span class="badge bg-success" id="stockCount">0 stocks</span>
            </div>
        </div>
    </header>

    <!-- Control Panel -->
    <div class="container-fluid bg-light py-3 border-bottom">
        <div class="container">
            <div class="row g-2">
                <div class="col-auto">
                    <button class="btn btn-primary" id="runScreener">
                        <i class="bi bi-play-fill"></i> Run Screener Now
                    </button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-secondary" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
                <div class="col-auto dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="exportBtn" data-bs-toggle="dropdown">
                        <i class="bi bi-download"></i> Export
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="exportBtn">
                        <li><a class="dropdown-item" href="#" id="exportCsv"><i class="bi bi-filetype-csv"></i> CSV</a></li>
                        <li><a class="dropdown-item" href="#" id="exportExcel"><i class="bi bi-file-earmark-excel"></i> Excel</a></li>
                        <li><a class="dropdown-item" href="#" id="exportPdf"><i class="bi bi-file-earmark-pdf"></i> PDF</a></li>
                    </ul>
                </div>
                <div class="col-auto">
                    <input type="text" class="form-control" id="searchBox" placeholder="Search symbol or company...">
                </div>
                <div class="col-auto">
                    <select class="form-select" id="filterRecommendation">
                        <option value="">All Recommendations</option>
                        <option value="Strong Buy">Strong Buy</option>
                        <option value="Buy">Buy</option>
                        <option value="Watch">Watch</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container-fluid py-4">
        <!-- Top Pick Banner -->
        <div id="topPickBanner" class="container mb-4">
            <!-- Top pick card will be inserted here -->
        </div>

        <!-- Results Container -->
        <div class="container">
            <div id="resultsContainer" class="row g-3">
                <!-- Stock cards will be inserted here -->
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="alert alert-info text-center" style="display: none;">
                <i class="bi bi-inbox"></i>
                <p>No stocks match the current screening criteria</p>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner-overlay" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-notification" style="display: none;">
        <span id="toastMessage"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
